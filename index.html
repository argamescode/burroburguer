<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>BurroBurguer - Adventure</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        touch-action: none;
      }
      html,
      body {
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        font-family: "Arial Black", "Arial", sans-serif;
      }
      #game-wrapper {
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      #game-area {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 100vh;
        overflow: hidden;
        background: #d4a574;
      }
      #floor {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image:
          linear-gradient(90deg, rgba(139, 90, 43, 0.3) 1px, transparent 1px),
          linear-gradient(rgba(139, 90, 43, 0.3) 1px, transparent 1px);
        background-size: 60px 60px;
        background-color: #e8d5b7;
      }
      #floor::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image: repeating-conic-gradient(
          #d4a574 0deg 90deg,
          #c49a6c 90deg 180deg,
          #d4a574 180deg 270deg,
          #c49a6c 270deg 360deg
        );
        background-size: 80px 80px;
        opacity: 0.6;
      }
      #kitchen {
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 200px;
        height: 60px;
        background: #696969;
        border: 4px solid #4a4a4a;
        border-radius: 0 0 10px 10px;
      }
      #kitchen::after {
        content: "COCINA";
        position: absolute;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        color: #ccc;
        font-size: 12px;
        font-weight: bold;
      }
      .entity {
        position: absolute;
        z-index: 10;
        filter: drop-shadow(2px 2px 2px rgba(0, 0, 0, 0.3));
      }
      #hud {
        position: absolute;
        top: 10px;
        left: 10px;
        right: 10px;
        display: flex;
        justify-content: space-between;
        z-index: 20;
      }
      .hud-item {
        color: white;
        font-size: 25px;
        text-shadow: 2px 2px 0 #000;
      }
      .hud-item span {
        color: #ffeb3b;
      }
      #timer {
        color: #ff6b6b;
        font-weight: bold;
      }
      .message {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: linear-gradient(145deg, #ff6b6b 0%, #ee5a5a 100%);
        color: white;
        padding: 20px 30px;
        border-radius: 10px;
        font-size: 18px;
        font-weight: bold;
        text-align: center;
        z-index: 100;
        box-shadow:
          0 8px 20px rgba(0, 0, 0, 0.4),
          inset 0 2px 4px rgba(255, 255, 255, 0.3);
        border: 4px solid #8b0000;
        text-shadow: 2px 2px 0 #8b0000;
      }
      .message button {
        margin-top: 15px;
        padding: 10px 20px;
        background: linear-gradient(145deg, #4caf50 0%, #45a049 100%);
        color: white;
        border: 3px solid #2e7d32;
        border-radius: 8px;
        cursor: pointer;
        font-family: inherit;
        font-size: 14px;
        font-weight: bold;
        text-shadow: 1px 1px 0 #000;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
      }
      @keyframes transformPulse {
        0% {
          transform: scale(1) rotate(0deg);
          opacity: 1;
        }
        25% {
          transform: scale(1.4) rotate(-10deg);
          opacity: 0.8;
        }
        50% {
          transform: scale(0.8) rotate(10deg);
          opacity: 0.6;
        }
        75% {
          transform: scale(1.3) rotate(-5deg);
          opacity: 0.9;
        }
        100% {
          transform: scale(1) rotate(0deg);
          opacity: 1;
        }
      }
      .transforming {
        animation: transformPulse 0.5s ease-in-out;
      }
      .particle {
        position: absolute;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        pointer-events: none;
        z-index: 50;
        animation: particleFly 0.6s ease-out forwards;
      }
      @keyframes particleFly {
        0% {
          transform: translate(0, 0) scale(1);
          opacity: 1;
        }
        100% {
          transform: translate(var(--tx), var(--ty)) scale(0);
          opacity: 0;
        }
      }
      #mobile-controls {
        display: none;
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
        pointer-events: none;
      }
      #mobile-controls .control-btn {
        pointer-events: auto;
        width: 60px;
        height: 60px;
        font-size: 26px;
        background:
          radial-gradient(
            circle at 30% 30%,
            rgba(255, 255, 255, 0.25),
            rgba(255, 255, 255, 0.05)
          ),
          linear-gradient(180deg, rgba(40, 40, 40, 0.9), rgba(10, 10, 10, 0.95));
        border: 2px solid rgba(255, 255, 255, 0.15);
        border-radius: 12px;
        color: #fff;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow:
          0 6px 14px rgba(0, 0, 0, 0.5),
          inset 0 2px 6px rgba(255, 255, 255, 0.1),
          inset 0 -3px 6px rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(6px);
        transition: all 0.1s ease;
        position: relative;
        overflow: hidden;
      }
      #mobile-controls .control-btn::before {
        content: "";
        position: absolute;
        width: 200%;
        height: 200%;
        top: -50%;
        left: -50%;
        background: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.15),
          transparent 60%
        );
        opacity: 0;
        transition: opacity 0.2s;
      }
      #mobile-controls .control-btn:active {
        transform: scale(0.9);
        background: linear-gradient(180deg, #111, #000);
        box-shadow:
          inset 0 4px 8px rgba(0, 0, 0, 0.9),
          inset 0 -2px 4px rgba(255, 255, 255, 0.05);
      }
      #mobile-controls .control-btn:active::before {
        opacity: 1;
      }
      .control-btn[data-dir="up"] {
        color: #4fc3f7;
      }
      .control-btn[data-dir="down"] {
        color: #81c784;
      }
      .control-btn[data-dir="left"] {
        color: #ffb74d;
      }
      .control-btn[data-dir="right"] {
        color: #e57373;
      }
      #mobile-controls .keyboard-layout {
        display: grid;
        grid-template-columns: repeat(3, 60px);
        grid-template-rows: repeat(2, 60px);
        gap: 6px;
      }
      @media (max-width: 768px) {
        #ui-bar {
          display: none;
        }
        #game-area {
          height: 80vh;
        }
        #mobile-controls {
          display: block;
          position: fixed;
          bottom: 10vh;
          left: 50%;
          transform: translateX(-50%);
        }
        .hud-item {
          font-size: 14px;
        }
      }
      @media (max-width: 600px) {
        #mobile-controls .control-btn {
          width: 65px;
          height: 65px;
          font-size: 32px;
        }
        .hud-item {
          font-size: 12px;
        }
      }
      @media (max-height: 500px) {
        #mobile-controls {
          bottom: 10px;
          left: 50%;
          transform: translateX(-50%);
        }
        #mobile-controls .control-btn {
          width: 50px;
          height: 50px;
          font-size: 24px;
        }
      }
    </style>
  </head>
  <body>
    <div id="game-area">
      <div id="floor"></div>
      <div id="kitchen"></div>
      <div id="hud">
        <div class="hud-item">🍔 BurroBurguer</div>
        <div class="hud-item">
          LVL: <span id="level">1</span> | TIME: <span id="timer">60.0s</span> |
          SCORE: <span id="score">0</span>
        </div>
      </div>
      <div id="player" class="entity"></div>
      <div id="donkey" class="entity"></div>
      <div id="message" class="message" style="display: none"></div>
      <div id="countdown" style="display: none"></div>
    </div>

    <div id="mobile-controls">
      <div class="keyboard-layout">
        <div
          class="control-btn"
          data-dir="up"
          style="grid-column: 2; grid-row: 1"
        >
          &#9650;
        </div>
        <div
          class="control-btn"
          data-dir="left"
          style="grid-column: 1; grid-row: 2"
        >
          &#9664;
        </div>
        <div
          class="control-btn"
          data-dir="down"
          style="grid-column: 2; grid-row: 2"
        >
          &#9660;
        </div>
        <div
          class="control-btn"
          data-dir="right"
          style="grid-column: 3; grid-row: 2"
        >
          &#9654;
        </div>
      </div>
    </div>

    <script>
      // ─── CONSTANTS ────────────────────────────────────────────────────────────
      const COLLISION_RADIUS_FACTOR = 2.5;
      const SPAWN_SAFE_ZONE = 120;
      const OBSTACLE_SPACING = 45;
      const CORNER_THRESHOLD = 50;
      const KEY_PENALTY_MS = 500;
      const TIME_LIMIT_S = 60;
      const NUM_OBSTACLES = 4;
      const TABLE_W = 40 * 1.5;
      const TABLE_H = 25 * 1.5;
      const DONKEY_EXTRA_SCALE = 1.25;
      const SPRITE_SCALE = 1.5;

      const LEVEL_PALETTES = [
        {
          floor: "#e8d5b7",
          checker1: "#d4a574",
          checker2: "#c49a6c",
          table: "#8b4513",
          kitchen: "#696969",
        },
        {
          floor: "#f5e6d3",
          checker1: "#e8c4a0",
          checker2: "#d4a574",
          table: "#a0522d",
          kitchen: "#5a5a5a",
        },
        {
          floor: "#e0d5c5",
          checker1: "#c9b8a0",
          checker2: "#b8a890",
          table: "#654321",
          kitchen: "#4a4a4a",
        },
        {
          floor: "#d4e5d0",
          checker1: "#a8c9a0",
          checker2: "#98b990",
          table: "#556b2f",
          kitchen: "#3d5c3d",
        },
        {
          floor: "#e5d4e0",
          checker1: "#c9a8c0",
          checker2: "#b898b0",
          table: "#6b2f55",
          kitchen: "#4a3a4a",
        },
        {
          floor: "#d0e0e5",
          checker1: "#a0c0c9",
          checker2: "#90b0b8",
          table: "#2f556b",
          kitchen: "#3a4a4a",
        },
        {
          floor: "#f0e5d0",
          checker1: "#e8d4a0",
          checker2: "#d8c490",
          table: "#8b7355",
          kitchen: "#5a5a4a",
        },
        {
          floor: "#e5e0d5",
          checker1: "#c9c0b8",
          checker2: "#b8b0a8",
          table: "#4a4a4a",
          kitchen: "#2a2a2a",
        },
      ];

      const gameArea = document.getElementById("game-area");
      const playerEl = document.getElementById("player");
      const donkeyEl = document.getElementById("donkey");
      const messageEl = document.getElementById("message");
      const scoreEl = document.getElementById("score");
      const timerEl = document.getElementById("timer");
      const levelEl = document.getElementById("level");
      const countdownEl = document.getElementById("countdown");

      let GAME_WIDTH = 0,
        GAME_HEIGHT = 0;
      let PLAYER_SIZE = 50,
        DONKEY_SIZE = 55;
      let PLAYER_SPEED = 5,
        DONKEY_SPEED = 4;

      let gameState = {
        player: { x: 50, y: 50, direction: "start" },
        donkey: { x: 200, y: 150, direction: "left" },
        level: 1,
        score: 0,
        totalTime: 0,
        keyPresses: 0,
        isCaught: false,
        gameActive: false,
        elapsedTime: 0,
        lastPlayerDirection: "start",
        donkeyLastDirectionChange: 0,
        waitingNextLevel: false,
      };

      let cachedObstacles = [];
      let startTime = 0,
        timerInterval = null,
        keys = {};

      // ─── DIMENSIONS ──────────────────────────────────────────────────────────
      function updateDimensions() {
        const rect = gameArea.getBoundingClientRect();
        GAME_WIDTH = rect.width;
        GAME_HEIGHT = rect.height;
        PLAYER_SIZE = Math.max(45, Math.min(60, GAME_WIDTH * 0.1));
        DONKEY_SIZE = Math.max(50, Math.min(65, GAME_WIDTH * 0.12));
      }

      function applyLevelColors() {
        const p = LEVEL_PALETTES[(gameState.level - 1) % LEVEL_PALETTES.length];
        document.getElementById("floor").style.backgroundColor = p.floor;
        let s = document.getElementById("dynamic-styles");
        if (!s) {
          s = document.createElement("style");
          s.id = "dynamic-styles";
          document.head.appendChild(s);
        }
        s.textContent = `
          #floor::before { background-image: repeating-conic-gradient(${p.checker1} 0deg 90deg,${p.checker2} 90deg 180deg,${p.checker1} 180deg 270deg,${p.checker2} 270deg 360deg) !important; }
          .dynamic-obstacle { background: ${p.table} !important; }
          .dynamic-obstacle > div { background: ${p.checker2} !important; }
          #kitchen { background: ${p.kitchen} !important; }
        `;
      }

      // ─── OBSTACLES ───────────────────────────────────────────────────────────
      function buildObstacles() {
        const margin = 60,
          gridSize = Math.ceil(Math.sqrt(NUM_OBSTACLES));
        const cellW = (GAME_WIDTH - margin * 2) / gridSize,
          cellH = (GAME_HEIGHT - margin * 2) / gridSize;
        const centerX = GAME_WIDTH / 2,
          centerY = GAME_HEIGHT / 2;
        const result = [];
        for (
          let row = 0;
          row < gridSize && result.length < NUM_OBSTACLES;
          row++
        ) {
          for (
            let col = 0;
            col < gridSize && result.length < NUM_OBSTACLES;
            col++
          ) {
            const x = margin + col * cellW + (cellW - TABLE_W) / 2,
              y = margin + row * cellH + (cellH - TABLE_H) / 2;
            if (
              Math.hypot(x + TABLE_W / 2 - centerX, y + TABLE_H / 2 - centerY) >
              SPAWN_SAFE_ZONE
            )
              result.push({ x, y, width: TABLE_W, height: TABLE_H });
          }
        }
        let attempts = 0;
        while (result.length < NUM_OBSTACLES && attempts++ < 200) {
          const x =
            margin + Math.random() * (GAME_WIDTH - margin * 2 - TABLE_W);
          const y =
            margin + Math.random() * (GAME_HEIGHT - margin * 2 - TABLE_H);
          if (
            Math.hypot(x + TABLE_W / 2 - centerX, y + TABLE_H / 2 - centerY) <=
            SPAWN_SAFE_ZONE
          )
            continue;
          if (
            !result.some(
              (o) =>
                x < o.x + o.width + OBSTACLE_SPACING &&
                x + TABLE_W > o.x - OBSTACLE_SPACING &&
                y < o.y + o.height + OBSTACLE_SPACING &&
                y + TABLE_H > o.y - OBSTACLE_SPACING,
            )
          )
            result.push({ x, y, width: TABLE_W, height: TABLE_H });
        }
        return result;
      }

      function renderObstacles() {
        document
          .querySelectorAll(".dynamic-obstacle")
          .forEach((el) => el.remove());
        cachedObstacles.forEach((obs) => {
          const el = document.createElement("div");
          el.className = "dynamic-obstacle";
          Object.assign(el.style, {
            position: "absolute",
            left: obs.x + "px",
            top: obs.y + "px",
            width: obs.width + "px",
            height: obs.height + "px",
            background: "#8b4513",
            border: "2px solid #654321",
            borderRadius: "4px",
            boxShadow: "0 2px 4px rgba(0,0,0,0.3)",
            zIndex: "5",
          });
          const d = document.createElement("div");
          Object.assign(d.style, {
            position: "absolute",
            top: "3px",
            left: "3px",
            right: "3px",
            bottom: "3px",
            background: "#a0522d",
            borderRadius: "2px",
          });
          el.appendChild(d);
          gameArea.appendChild(el);
        });
      }

      // ─── COLLISION ───────────────────────────────────────────────────────────
      function collidesWithObstacle(x, y, size) {
        return cachedObstacles.some(
          (o) =>
            x < o.x + o.width &&
            x + size > o.x &&
            y < o.y + o.height &&
            y + size > o.y,
        );
      }
      function collidesWithObstacleForDonkey(x, y, size) {
        const b = 20;
        return cachedObstacles.some(
          (o) =>
            x - b < o.x + o.width &&
            x + size + b > o.x &&
            y - b < o.y + o.height &&
            y + size + b > o.y,
        );
      }

      function moveEntity(entity, dx, dy, size) {
        const cx = (x) => Math.max(0, Math.min(GAME_WIDTH - size, x));
        const cy = (y) => Math.max(0, Math.min(GAME_HEIGHT - size, y));
        const nx = cx(entity.x + dx),
          ny = cy(entity.y + dy);
        if (!collidesWithObstacle(nx, ny, size)) {
          entity.x = nx;
          entity.y = ny;
          return;
        }
        if (!collidesWithObstacle(nx, entity.y, size)) {
          entity.x = nx;
          return;
        }
        if (!collidesWithObstacle(entity.x, ny, size)) {
          entity.y = ny;
          return;
        }
        const h = 0.55;
        for (const [sx, sy] of [
          [dx * h, dy * h],
          [-dx * h, dy * h],
          [dx * h, -dy * h],
          [-dx * h, -dy * h],
        ]) {
          const snx = cx(entity.x + sx),
            sny = cy(entity.y + sy);
          if (!collidesWithObstacle(snx, sny, size)) {
            entity.x = snx;
            entity.y = sny;
            return;
          }
        }
      }

      function moveDonkey(donkey, dx, dy, size) {
        const cx = (x) => Math.max(0, Math.min(GAME_WIDTH - size, x));
        const cy = (y) => Math.max(0, Math.min(GAME_HEIGHT - size, y));
        const nx = cx(donkey.x + dx),
          ny = cy(donkey.y + dy);
        if (!collidesWithObstacleForDonkey(nx, ny, size)) {
          donkey.x = nx;
          donkey.y = ny;
          return;
        }
        if (!collidesWithObstacleForDonkey(nx, donkey.y, size)) {
          donkey.x = nx;
          return;
        }
        if (!collidesWithObstacleForDonkey(donkey.x, ny, size)) {
          donkey.y = ny;
          return;
        }
        const h = 0.55;
        for (const [sx, sy] of [
          [dx * h, dy * h],
          [-dx * h, dy * h],
          [dx * h, -dy * h],
          [-dx * h, -dy * h],
        ]) {
          const snx = cx(donkey.x + sx),
            sny = cy(donkey.y + sy);
          if (!collidesWithObstacleForDonkey(snx, sny, size)) {
            donkey.x = snx;
            donkey.y = sny;
            return;
          }
        }
      }

      // ─── UNSTUCK ─────────────────────────────────────────────────────────────
      const STUCK_FRAMES = 4;
      let donkeyStuckCounter = 0,
        donkeyLastPos = { x: -1, y: -1 };

      function unstuckDonkey() {
        const { donkey } = gameState;
        const moved =
          Math.hypot(donkey.x - donkeyLastPos.x, donkey.y - donkeyLastPos.y) >
          0.5;
        donkeyStuckCounter = moved ? 0 : donkeyStuckCounter + 1;
        donkeyLastPos = { x: donkey.x, y: donkey.y };
        if (donkeyStuckCounter >= STUCK_FRAMES) {
          donkeyStuckCounter = 0;
          const angles = [
            0,
            Math.PI / 4,
            Math.PI / 2,
            (3 * Math.PI) / 4,
            Math.PI,
            (5 * Math.PI) / 4,
            (3 * Math.PI) / 2,
            (7 * Math.PI) / 4,
          ].sort(() => Math.random() - 0.5);
          const nudge = DONKEY_SPEED * 3;
          for (const a of angles) {
            const nx = Math.max(
              0,
              Math.min(
                GAME_WIDTH - DONKEY_SIZE,
                donkey.x + Math.cos(a) * nudge,
              ),
            );
            const ny = Math.max(
              0,
              Math.min(
                GAME_HEIGHT - DONKEY_SIZE,
                donkey.y + Math.sin(a) * nudge,
              ),
            );
            if (!collidesWithObstacle(nx, ny, DONKEY_SIZE)) {
              donkey.x = nx;
              donkey.y = ny;
              gameState.donkeyLastDirectionChange = 0;
              break;
            }
          }
        }
      }

      function entitiesCollide() {
        return (
          Math.hypot(
            gameState.player.x - gameState.donkey.x,
            gameState.player.y - gameState.donkey.y,
          ) <
          (PLAYER_SIZE + DONKEY_SIZE) / COLLISION_RADIUS_FACTOR
        );
      }

      // ─── INPUT ───────────────────────────────────────────────────────────────
      function handleInput() {
        const { player } = gameState;
        let dx = 0,
          dy = 0,
          moving = false;
        if (keys["w"] || keys["arrowup"] || keys["up"]) {
          dy = -PLAYER_SPEED;
          player.direction = "north";
          moving = true;
        }
        if (keys["s"] || keys["arrowdown"] || keys["down"]) {
          dy = PLAYER_SPEED;
          player.direction = "south";
          moving = true;
        }
        if (keys["a"] || keys["arrowleft"] || keys["left"]) {
          dx = -PLAYER_SPEED;
          player.direction = "west";
          moving = true;
        }
        if (keys["d"] || keys["arrowright"] || keys["right"]) {
          dx = PLAYER_SPEED;
          player.direction = "east";
          moving = true;
        }
        if (!moving) player.direction = "start";
        moveEntity(player, dx, dy, PLAYER_SIZE);
      }

      // ─── DONKEY AI ────────────────────────────────────────────────────────────
      function findBestCover(donkey, player) {
        const dx = donkey.x - player.x,
          dy = donkey.y - player.y,
          dist = Math.hypot(dx, dy);
        let best = null,
          bestScore = -Infinity;
        for (const obs of cachedObstacles) {
          const cx = obs.x + obs.width / 2,
            cy = obs.y + obs.height / 2;
          const dToObs = Math.hypot(donkey.x - cx, donkey.y - cy),
            obsToP = Math.hypot(cx - player.x, cy - player.y);
          if (dToObs + obsToP >= dist * 1.5) continue;
          const score =
            (Math.PI -
              Math.abs(
                Math.atan2(dy, dx) - Math.atan2(cy - donkey.y, cx - donkey.x),
              )) *
              100 -
            dToObs;
          if (score > bestScore) {
            bestScore = score;
            best = obs;
          }
        }
        return best;
      }

      function getDifficultyProfile(level) {
        const L = level + 1;
        return {
          fleeSpeed: Math.min(6.2, 3.5 + L * 0.75),
          coverSpeed: Math.min(5.8, 3.2 + L * 0.7),
          wanderSpeed: Math.min(4.5, 2.2 + L * 0.5),
          detectionRange: Math.min(GAME_WIDTH, 300 + L * 60),
          dirChangePeriod: Math.max(60, 300 - L * 75),
          coverSeekChance: Math.min(0.99, 0.55 + L * 0.08),
          feintChance: Math.min(0.12, 0.02 + L * 0.01),
          predictionWeight: Math.min(1.0, 0.4 + L * 0.1),
          zigzagAmplitude: Math.min(4.5, 1.5 + L * 0.4),
          zigzagFrequency: 0.02 + L * 0.004,
          coverOrbitRadius: Math.max(8, 30 - L * 3),
        };
      }

      function updateDonkeyAI() {
        const { donkey, player } = gameState;
        const profile = getDifficultyProfile(gameState.level);
        const now = Date.now();

        const prevDonkeyX = donkey.x,
          prevDonkeyY = donkey.y;
        if (!gameState.playerPrev)
          gameState.playerPrev = { x: player.x, y: player.y };
        const pvx = player.x - gameState.playerPrev.x;
        const pvy = player.y - gameState.playerPrev.y;
        gameState.playerPrev = { x: player.x, y: player.y };

        const predX = player.x + pvx * 22 * profile.predictionWeight;
        const predY = player.y + pvy * 22 * profile.predictionWeight;

        const dx = donkey.x - predX,
          dy = donkey.y - predY;
        const dist = Math.hypot(dx, dy);
        const actualDist = Math.hypot(donkey.x - player.x, donkey.y - player.y);

        const nearLeft = donkey.x < CORNER_THRESHOLD;
        const nearRight =
          donkey.x > GAME_WIDTH - DONKEY_SIZE - CORNER_THRESHOLD;
        const nearTop = donkey.y < CORNER_THRESHOLD;
        const nearBottom =
          donkey.y > GAME_HEIGHT - DONKEY_SIZE - CORNER_THRESHOLD;

        if (actualDist > 0 && actualDist < profile.detectionRange) {
          // ── EVASION MODE ──────────────────────────────────────────────────
          if (dist > 0 && Math.random() < profile.feintChance) {
            moveDonkey(
              donkey,
              (-dx / dist) * profile.fleeSpeed * 2.5,
              (-dy / dist) * profile.fleeSpeed * 2.5,
              DONKEY_SIZE,
            );
          }

          const cover =
            Math.random() < profile.coverSeekChance
              ? findBestCover(donkey, player)
              : null;

          if (cover) {
            const cx = cover.x + cover.width / 2,
              cy = cover.y + cover.height / 2;
            const covDx = cx - donkey.x,
              covDy = cy - donkey.y,
              covDist = Math.hypot(covDx, covDy);
            if (covDist > profile.coverOrbitRadius) {
              moveDonkey(
                donkey,
                (covDx / covDist) * profile.coverSpeed,
                (covDy / covDist) * profile.coverSpeed,
                DONKEY_SIZE,
              );
            } else {
              const perpAngle = Math.atan2(dy, dx) + Math.PI / 2;
              const speed = profile.coverSpeed * 0.7;
              const prevX = donkey.x,
                prevY = donkey.y;
              moveDonkey(
                donkey,
                Math.cos(perpAngle) * speed,
                Math.sin(perpAngle) * speed,
                DONKEY_SIZE,
              );
              if (donkey.x === prevX && donkey.y === prevY)
                moveDonkey(
                  donkey,
                  -Math.cos(perpAngle) * speed,
                  -Math.sin(perpAngle) * speed,
                  DONKEY_SIZE,
                );
            }
          } else {
            let ax = dist > 0 ? (dx / dist) * profile.fleeSpeed : 0;
            let ay = dist > 0 ? (dy / dist) * profile.fleeSpeed : 0;
            ax +=
              Math.sin(now * profile.zigzagFrequency) * profile.zigzagAmplitude;
            ay +=
              Math.cos(now * profile.zigzagFrequency) * profile.zigzagAmplitude;
            if (nearLeft) ax = Math.abs(ax) * 1.8;
            if (nearRight) ax = -Math.abs(ax) * 1.8;
            if (nearTop) ay = Math.abs(ay) * 1.8;
            if (nearBottom) ay = -Math.abs(ay) * 1.8;
            if ((nearLeft || nearRight) && (nearTop || nearBottom)) {
              ax = Math.abs(ax) * (nearLeft ? 1 : -1) * 1.5;
              ay = Math.abs(ay) * (nearTop ? 1 : -1) * 1.5;
            }
            moveDonkey(donkey, ax, ay, DONKEY_SIZE);
          }
        } else if (actualDist > 0) {
          // ── WANDER MODE ───────────────────────────────────────────────────
          let mx, my;
          if (
            now - gameState.donkeyLastDirectionChange >
            profile.dirChangePeriod
          ) {
            const angle = Math.random() * Math.PI * 2;
            mx = Math.cos(angle) * profile.wanderSpeed;
            my = Math.sin(angle) * profile.wanderSpeed;
            gameState.donkeyLastDirectionChange = now;
          } else {
            mx = (Math.random() - 0.5) * profile.wanderSpeed;
            my = (Math.random() - 0.5) * profile.wanderSpeed;
          }
          let nearest = null,
            nearestDist = Infinity;
          for (const obs of cachedObstacles) {
            const cx = obs.x + obs.width / 2,
              cy = obs.y + obs.height / 2;
            const d = Math.hypot(donkey.x - cx, donkey.y - cy);
            if (d < nearestDist && d > 40) {
              nearestDist = d;
              nearest = obs;
            }
          }
          if (nearest && Math.random() > 0.3) {
            mx +=
              ((nearest.x + nearest.width / 2 - donkey.x) / nearestDist) *
              profile.wanderSpeed *
              0.4;
            my +=
              ((nearest.y + nearest.height / 2 - donkey.y) / nearestDist) *
              profile.wanderSpeed *
              0.4;
          }
          if (nearLeft && mx < 0) mx = Math.abs(mx);
          if (nearRight && mx > 0) mx = -Math.abs(mx);
          if (nearTop && my < 0) my = Math.abs(my);
          if (nearBottom && my > 0) my = -Math.abs(my);
          moveDonkey(donkey, mx, my, DONKEY_SIZE);
        }

        unstuckDonkey();
        const ddx = donkey.x - prevDonkeyX,
          ddy = donkey.y - prevDonkeyY;
        if (Math.abs(ddx) + Math.abs(ddy) > 0.3) {
          if (Math.abs(ddx) >= Math.abs(ddy)) {
            gameState.donkey.direction = ddx > 0 ? "east" : "west";
          } else {
            gameState.donkey.direction = ddy > 0 ? "south" : "north";
          }
        }
      }

      // ─── SPRITES ─────────────────────────────────────────────────────────────
      // Persistent <img> elements — src updated in-place, never recreated.
      // Prevents GIF flicker and mobile disappear caused by innerHTML rewrites.
      let playerImg = null,
        donkeyImg = null;

      function ensureImgs() {
        if (!playerImg) {
          playerImg = document.createElement("img");
          playerImg.style.cssText =
            "image-rendering:pixelated;position:relative;";
          playerEl.appendChild(playerImg);
        }
        if (!donkeyImg) {
          donkeyImg = document.createElement("img");
          donkeyImg.style.cssText =
            "image-rendering:pixelated;position:relative;";
          donkeyEl.appendChild(donkeyImg);
        }
      }

      function updatePlayerSprite(dir, celebrating = false) {
        ensureImgs();
        const file = celebrating
          ? "celebrate.gif"
          : ({
              north: "run_north",
              south: "run_south",
              west: "run_west",
              east: "run_east",
              start: "start",
            }[dir] || "start") + ".gif";
        const src = "sprites/" + file;
        const sz = PLAYER_SIZE * SPRITE_SCALE;
        const off = -(sz - PLAYER_SIZE) / 2;
        if (playerImg.dataset.src !== src) {
          playerImg.src = src;
          playerImg.dataset.src = src;
        }
        playerImg.width = sz;
        playerImg.height = sz;
        playerImg.style.left = off + "px";
        playerImg.style.top = off + "px";
      }

      function updateDonkeySprite(dir, caught = false) {
        ensureImgs();
        let src;
        if (caught) {
          src = "sprites/burguer.png";
        } else {
          const file =
            ({
              north: "burro_north",
              south: "burro_south",
              west: "burro_west",
              east: "burro_east",
            }[dir] || "burro_south") + ".gif";
          src = "sprites/" + file;
        }
        const sz = caught
          ? DONKEY_SIZE * 0.7
          : DONKEY_SIZE * SPRITE_SCALE * DONKEY_EXTRA_SCALE;
        const off = caught ? 0 : -(sz - DONKEY_SIZE) / 2;
        if (donkeyImg.dataset.src !== src) {
          donkeyImg.src = src;
          donkeyImg.dataset.src = src;
        }
        donkeyImg.width = sz;
        donkeyImg.height = sz;
        donkeyImg.style.left = off + "px";
        donkeyImg.style.top = off + "px";
      }

      // ─── PARTICLES ───────────────────────────────────────────────────────────
      function spawnParticles(x, y) {
        const colors = ["#ff6b6b", "#ffeb3b", "#4caf50", "#ff9900", "#fff"];
        for (let i = 0; i < 12; i++) {
          const p = document.createElement("div");
          p.className = "particle";
          const angle = (i / 12) * Math.PI * 2,
            dist = 40 + Math.random() * 40;
          p.style.setProperty("--tx", Math.cos(angle) * dist + "px");
          p.style.setProperty("--ty", Math.sin(angle) * dist + "px");
          p.style.background = colors[i % colors.length];
          p.style.left = x + DONKEY_SIZE / 2 + "px";
          p.style.top = y + DONKEY_SIZE / 2 + "px";
          gameArea.appendChild(p);
          setTimeout(() => p.remove(), 650);
        }
      }

      // ─── RENDER ───────────────────────────────────────────────────────────────
      // Last-rendered state — render() is a no-op when nothing changed.
      const lastRender = {
        px: -1,
        py: -1,
        pdir: "",
        dk_x: -1,
        dk_y: -1,
        dkdir: "",
        caught: false,
      };

      function render(force = false) {
        const { player, donkey, isCaught } = gameState;
        const pChanged =
          force ||
          player.x !== lastRender.px ||
          player.y !== lastRender.py ||
          player.direction !== lastRender.pdir ||
          isCaught !== lastRender.caught;
        const dkChanged =
          force ||
          donkey.x !== lastRender.dk_x ||
          donkey.y !== lastRender.dk_y ||
          donkey.direction !== lastRender.dkdir ||
          isCaught !== lastRender.caught;
        if (pChanged) {
          playerEl.style.left = player.x + "px";
          playerEl.style.top = player.y + "px";
          updatePlayerSprite(player.direction, isCaught);
          lastRender.px = player.x;
          lastRender.py = player.y;
          lastRender.pdir = player.direction;
        }
        if (dkChanged) {
          donkeyEl.style.left = donkey.x + "px";
          donkeyEl.style.top = donkey.y + "px";
          updateDonkeySprite(donkey.direction, isCaught);
          lastRender.dk_x = donkey.x;
          lastRender.dk_y = donkey.y;
          lastRender.dkdir = donkey.direction;
        }
        if (pChanged || dkChanged) lastRender.caught = isCaught;
      }

      // ─── TIMER ────────────────────────────────────────────────────────────────
      function startTimer() {
        startTime = Date.now();
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(tickTimer, 100);
      }
      function stopTimer() {
        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }
      }

      function tickTimer() {
        if (!gameState.gameActive || gameState.isCaught) return;
        gameState.elapsedTime = (Date.now() - startTime) / 1000;
        if (gameState.elapsedTime >= TIME_LIMIT_S) {
          stopTimer();
          gameState.isCaught = true;
          onTimeUp();
          return;
        }
        const r = Math.max(0, TIME_LIMIT_S - gameState.elapsedTime);
        timerEl.textContent = r.toFixed(1) + "s";
        timerEl.style.color =
          r <= 10 ? "#ff4444" : r <= 20 ? "#ff9900" : "#ff6b6b";
      }

      function onTimeUp() {
        gameState.gameActive = false;
        gameState.waitingNextLevel = true;
        messageEl.innerHTML = `⏱️ ¡TIEMPO AGOTADO!<br><button id="retryBtn">Reintentar</button>`;
        messageEl.style.display = "block";
        document.getElementById("retryBtn").onclick = () => {
          gameState.waitingNextLevel = false;
          resetGame();
        };
      }

      // ─── GAME LOOP ────────────────────────────────────────────────────────────
      function update() {
        if (
          !gameState.gameActive ||
          gameState.isCaught ||
          gameState.waitingNextLevel
        )
          return;
        handleInput();
        updateDonkeyAI();
        if (entitiesCollide()) {
          onCatch();
        } else {
          render();
        }
      }

      function onCatch() {
        gameState.lastPlayerDirection = gameState.player.direction;
        gameState.isCaught = true;
        gameState.gameActive = false;
        gameState.waitingNextLevel = true;
        stopTimer();
        const roundMs = Math.floor(gameState.elapsedTime * 1000),
          keyPenalty = gameState.keyPresses * KEY_PENALTY_MS;
        gameState.totalTime += roundMs;
        gameState.score = Math.max(0, gameState.totalTime - keyPenalty);
        scoreEl.textContent = gameState.score;
        spawnParticles(gameState.donkey.x, gameState.donkey.y);
        donkeyEl.classList.add("transforming");
        donkeyEl.addEventListener(
          "animationend",
          () => donkeyEl.classList.remove("transforming"),
          { once: true },
        );
        render();
        messageEl.innerHTML = `🎉 ¡ATRAPASTE AL BURRO!<br>Nivel completado<br><br><button id="nextLevelBtn">Siguiente nivel</button>`;
        messageEl.style.display = "block";
        document.getElementById("nextLevelBtn").onclick = () => {
          gameState.level++;
          levelEl.textContent = gameState.level;
          gameState.waitingNextLevel = false;
          resetGame();
        };
      }

      // ─── COUNTDOWN ───────────────────────────────────────────────────────────
      function showCountdown(callback) {
        gameState.gameActive = false;
        let count = 3;
        Object.assign(countdownEl.style, {
          display: "block",
          position: "absolute",
          top: "50%",
          left: "50%",
          transform: "translate(-50%,-50%)",
          fontSize: "72px",
          fontWeight: "bold",
          color: "#ff6b6b",
          textShadow: "3px 3px 0 #8b0000",
          zIndex: "100",
        });
        countdownEl.textContent = count;
        const iv = setInterval(() => {
          count--;
          if (count > 0) countdownEl.textContent = count;
          else if (count === 0) countdownEl.textContent = "GO!";
          else {
            clearInterval(iv);
            countdownEl.style.display = "none";
            gameState.gameActive = true;
            if (callback) callback();
          }
        }, 800);
      }

      // ─── RESET ────────────────────────────────────────────────────────────────
      window.resetGame = function () {
        updateDimensions();
        applyLevelColors();
        cachedObstacles = buildObstacles();
        renderObstacles();
        const cx = GAME_WIDTH / 2,
          cy = GAME_HEIGHT / 2;
        let pX = cx - 80,
          pY = cy;
        for (
          let i = 0;
          i < 20 && collidesWithObstacle(pX, pY, PLAYER_SIZE);
          i++
        ) {
          pX = cx - 80 + (Math.random() - 0.5) * 100;
          pY = cy + (Math.random() - 0.5) * 100;
        }
        let dX = cx + 80,
          dY = cy,
          placed = false;
        for (let i = 0; i < 50 && !placed; i++) {
          const tx = 60 + Math.random() * (GAME_WIDTH - 120 - DONKEY_SIZE),
            ty = 60 + Math.random() * (GAME_HEIGHT - 120 - DONKEY_SIZE);
          if (
            !collidesWithObstacle(tx, ty, DONKEY_SIZE) &&
            Math.hypot(tx - pX, ty - pY) > 100
          ) {
            dX = tx;
            dY = ty;
            placed = true;
          }
        }
        if (!placed) {
          const a = Math.random() * Math.PI * 2;
          dX = Math.max(
            60,
            Math.min(GAME_WIDTH - DONKEY_SIZE - 60, cx + Math.cos(a) * 150),
          );
          dY = Math.max(
            60,
            Math.min(GAME_HEIGHT - DONKEY_SIZE - 60, cy + Math.sin(a) * 150),
          );
        }
        gameState.player = { x: pX, y: pY, direction: "start" };
        gameState.donkey = { x: dX, y: dY, direction: "left" };
        gameState.isCaught = false;
        gameState.elapsedTime = 0;
        gameState.keyPresses = 0;
        gameState.donkeyLastDirectionChange = Date.now();
        donkeyStuckCounter = 0;
        donkeyLastPos = { x: -1, y: -1 };
        gameState.playerPrev = null;
        messageEl.style.display = "none";
        timerEl.textContent = TIME_LIMIT_S.toFixed(1) + "s";
        timerEl.style.color = "#ff6b6b";
        // Reset persistent sprite elements and render cache
        playerEl.innerHTML = "";
        playerImg = null;
        donkeyEl.innerHTML = "";
        donkeyImg = null;
        Object.assign(lastRender, {
          px: -1,
          py: -1,
          pdir: "",
          dk_x: -1,
          dk_y: -1,
          dkdir: "",
          caught: false,
        });
        render(true);
        showCountdown(() => startTimer());
      };

      // ─── PAUSE / RESUME ───────────────────────────────────────────────────────
      function pauseGame() {
        if (!gameState.gameActive || gameState.isCaught) return;
        gameState.gameActive = false;
        stopTimer();
        messageEl.innerHTML =
          "JUEGO PAUSADO<br>Presiona ESPACIO o haz clic para continuar";
        messageEl.style.display = "block";
      }
      function resumeGame() {
        if (gameState.isCaught || gameState.waitingNextLevel) return;
        messageEl.style.display = "none";
        gameState.gameActive = true;
        startTimer();
      }
      window.addEventListener("blur", pauseGame);
      window.addEventListener("focus", resumeGame);
      document.addEventListener("visibilitychange", () => {
        if (document.hidden) pauseGame();
        else resumeGame();
      });
      window.addEventListener("keydown", (e) => {
        if (
          e.code === "Space" &&
          messageEl.style.display === "block" &&
          !gameState.gameActive &&
          !gameState.waitingNextLevel
        ) {
          e.preventDefault();
          resumeGame();
        }
      });
      document.addEventListener("click", (e) => {
        if (
          messageEl.style.display === "block" &&
          !gameState.gameActive &&
          !gameState.waitingNextLevel &&
          !e.target.closest(".message button")
        )
          resumeGame();
      });

      // ─── INPUT LISTENERS ─────────────────────────────────────────────────────
      window.addEventListener("keydown", (e) => {
        const k = e.key.toLowerCase();
        if (!keys[k] && gameState.gameActive) gameState.keyPresses++;
        keys[k] = true;
      });
      window.addEventListener("keyup", (e) => {
        keys[e.key.toLowerCase()] = false;
      });
      document.querySelectorAll(".control-btn").forEach((btn) => {
        const dir = btn.dataset.dir;
        const press = () => {
          if (!keys[dir] && gameState.gameActive) gameState.keyPresses++;
          keys[dir] = true;
        };
        const release = () => {
          keys[dir] = false;
        };
        btn.addEventListener(
          "touchstart",
          (e) => {
            e.preventDefault();
            press();
          },
          { passive: false },
        );
        btn.addEventListener(
          "touchend",
          (e) => {
            e.preventDefault();
            release();
          },
          { passive: false },
        );
        btn.addEventListener("mousedown", press);
        btn.addEventListener("mouseup", release);
        btn.addEventListener("mouseleave", release);
      });

      // ─── BOOT ────────────────────────────────────────────────────────────────
      window.addEventListener("load", () => {
        sessionStorage.removeItem("burroBurgerScore");
        sessionStorage.removeItem("burroBurgerLevel");
        gameState.level = 1;
        gameState.score = 0;
        gameState.totalTime = 0;
        gameState.keyPresses = 0;
        levelEl.textContent = 1;
        scoreEl.textContent = 0;
        updateDimensions();
        resetGame();
        setInterval(update, 16);
      });
    </script>
  </body>
</html>
